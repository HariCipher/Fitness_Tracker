<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if mode == 'login' %}Login{% else %}Register{% endif %} – IronLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-up">
    <div class="auth-logo">⚡ IRONLOG</div>

    {% if mode == 'login' %}
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to continue your journey</p>

    <div id="error-msg" style="display:none" class="flash flash-error"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-input" placeholder="your_username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="doLogin()">
      Sign In
    </button>
    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>

    {% else %}
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Join IronLog and start tracking today</p>

    <div id="error-msg" style="display:none" class="flash flash-error"></div>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" class="form-input" placeholder="John Doe">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="username">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@email.com">
      </div>
    </div>
    <div class="form-group" style="margin-top:1rem">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Min 6 characters">
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;padding:12px;margin-top:0.5rem" onclick="doRegister()">
      Create Account
    </button>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
    {% endif %}
  </div>
</div>

<script>
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}

async function doLogin() {
  const btn = event.target;
  btn.textContent = 'Signing in...'; btn.disabled = true;
  const res = await fetch('/login', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if (data.success) { window.location.href = data.redirect; }
  else { showError(data.error); btn.textContent = 'Sign In'; btn.disabled = false; }
}

async function doRegister() {
  const btn = event.target;
  const password = document.getElementById('password').value;
  if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
  btn.textContent = 'Creating...'; btn.disabled = true;
  const res = await fetch('/register', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name: document.getElementById('name')?.value || '',
      username: document.getElementById('username').value,
      email: document.getElementById('email')?.value || '',
      password
    })
  });
  const data = await res.json();
  if (data.success) { window.location.href = data.redirect; }
  else { showError(data.error); btn.textContent = 'Create Account'; btn.disabled = false; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    {% if mode == 'login' %}doLogin();{% else %}doRegister();{% endif %}
  }
});
</script>
</body>
</html>
